<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro SRT - Residência Terapêutica</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container">
    <h1>Formulário de Cadastro da SRT</h1>
    <form id="srtForm">
      <section id="generalFields">
        <h2>Dados da SRT</h2>
      </section>
      
      <section id="residenceFields">
        <h2>Dados da Residência</h2>
      </section>
      
      <section id="generalResidents">
        <h2>Dados Gerais dos Moradores</h2>
        <label for="totalResidents">Quantidade total de moradores</label>
        <input type="number" id="totalResidents" min="0" required>
        
        <label for="vagasTotais">Vagas totais</label>
        <input type="number" id="vagasTotais" min="0" required>
        
        <label for="vagasOcupadas">Vagas ocupadas</label>
        <input type="number" id="vagasOcupadas" min="0" required>
        
        <label for="vagasDisponiveis">Vagas disponíveis</label>
        <input type="number" id="vagasDisponiveis" min="0" required>
      </section>

      <section id="caregiverFields">
        <h2>Dados da Equipe/Cuidadores</h2>
      </section>

      <section id="residentCount">
        <h2>Dados Individuais dos Moradores</h2>
        <label for="numMoradores">Quantos moradores existem nesta casa?</label>
        <input type="number" id="numMoradores" min="0" max="20">
        <div id="residentsContainer"></div>
      </section>

      <div class="form-actions">
        <button type="submit" id="submitBtn">Enviar Dados</button>
        <button type="button" id="clearBtn">Limpar Formulário</button>
      </div>
    </form>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
