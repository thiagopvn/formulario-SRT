<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro - SRT</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header">
                <h1 class="text-center">Formulário de Cadastro</h1>
            </div>
            <div class="card-body">
                <form id="form-usuario">
                    <div id="step-1" class="form-step">
                        <h2 class="text-center">Informações Pessoais</h2>
                        <div class="form-group">
                            <label for="nome">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" required>
                        </div>
                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="d-flex justify-content-end mt-3">
                            <button type="button" class="btn btn-primary" onclick="nextStep()">Próximo</button>
                        </div>
                    </div>
                    <div id="step-2" class="form-step">
                        <h2 class="text-center">Endereço</h2>
                        <div class="form-group">
                            <label for="cep">CEP</label>
                            <input type="text" class="form-control" id="cep" required>
                        </div>
                        <div class="form-group">
                            <label for="rua">Rua</label>
                            <input type="text" class="form-control" id="rua" required>
                        </div>
                        <div class="form-group">
                            <label for="numero">Número</label>
                            <input type="text" class="form-control" id="numero" required>
                        </div>
                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" class="btn btn-secondary" onclick="prevStep()">Voltar</button>
                            <button type="button" class="btn btn-primary" onclick="nextStep()">Próximo</button>
                        </div>
                    </div>
                    <div id="step-3" class="form-step">
                        <h2 class="text-center">Documentos</h2>
                        <div class="form-group">
                            <label for="rg">RG</label>
                            <input type="text" class="form-control" id="rg" required>
                        </div>
                        <div class="form-group">
                            <label for="cpf">CPF</label>
                            <input type="text" class="form-control" id="cpf" required>
                        </div>
                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" class="btn btn-secondary" onclick="prevStep()">Voltar</button>
                            <button type="button" class="btn btn-primary" onclick="nextStep()">Próximo</button>
                        </div>
                    </div>
                    <div id="step-4" class="form-step">
                        <h2 class="text-center">Moradores</h2>
                        <div id="moradores-container">
                            <!-- Moradores serão adicionados aqui -->
                        </div>
                        <button type="button" class="btn btn-success" id="add-morador">Adicionar Morador</button>
                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" class="btn btn-secondary" onclick="prevStep()">Voltar</button>
                            <button type="button" class="btn btn-primary" onclick="nextStep()">Próximo</button>
                        </div>
                    </div>
                    <div id="step-5" class="form-step">
                        <h2 class="text-center">Comentários</h2>
                        <div class="form-group">
                            <label for="comentarios">Gostaria de deixar algum comentário ou observação?</label>
                            <textarea class="form-control" id="comentarios" rows="5"></textarea>
                        </div>
                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" class="btn btn-secondary" onclick="prevStep()">Voltar</button>
                            <button type="submit" class="btn btn-primary">Enviar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/usuario.js"></script>
</body>
</html>
